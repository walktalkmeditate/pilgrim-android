name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug
        env:
          # Mapbox SDK artifacts live behind an authenticated Maven repo.
          # Add MAPBOX_DOWNLOADS_TOKEN (scope: downloads:read) as a repo
          # secret so CI can resolve com.mapbox.* dependencies. Absent
          # token → 401 from Mapbox → assemble fails loudly.
          #
          # GitHub does NOT pass repo secrets to workflows triggered by
          # pull_request from forks — so any fork PR will hit the 401 and
          # fail at dependency resolution with a confusing Maven auth
          # error. This is accepted: the app isn't currently soliciting
          # external contributions, and switching to pull_request_target
          # to work around it opens a well-known code-execution vector.
          # When we open up contributions, document the expected failure
          # in CONTRIBUTING.md rather than relaxing the CI posture.
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          # Public access token (pk.xxx) baked into BuildConfig at build
          # time. Debug APKs from CI without this can't render map tiles;
          # useful for emulator/instrumented testing downstream.
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: ./gradlew assembleDebug

      - name: Lint
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: ./gradlew lintDebug

      - name: Unit tests
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: ./gradlew testDebugUnitTest

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 7
