name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Three jobs run in parallel (assemble / lint / test) to cut wall-clock
# time roughly in half vs the original single-job pipeline. Each one
# warm-loads the same Gradle dependency cache via setup-gradle's
# read-write contract — the first job to finish populates the cache
# for the next pipeline run. Gradle's own configuration cache (in
# `gradle.properties`) cuts another 5-15s per task graph rebuild.
#
# Mapbox SDK auth: every job that resolves dependencies needs the
# downloads token; the access token is only required for assemble (it's
# baked into BuildConfig). Forks won't have these secrets — the jobs
# will fail at dependency resolution with an auth error. Documented
# trade-off; revisit if/when external contributions open up.
env:
  MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
  MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}

jobs:
  assemble:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # CI doesn't need full git history; fetch-depth=1 saves
          # network + clone time on a repo with hundreds of commits.
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Tightened cache key so a libs.versions.toml change doesn't
          # invalidate every cache entry; the action keys on file
          # contents by default but being explicit avoids drift if we
          # add more dependency files.
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug
        run: ./gradlew assembleDebug

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Lint
        run: ./gradlew lintDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 7
